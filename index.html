<!doctype html>
<html lang="de" data-ui-theme="dark" data-ui-density="comfortable">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ui-kit/0 – Widget & Feature Demo</title>

  <!-- ui-kit/0 CSS (repo root -> ./src/...) -->
  <link rel="stylesheet" href="./src/ui-kit-0.theme.css" />
  <link rel="stylesheet" href="./src/ui-kit-0.css" />

  <!-- Third-party deps (MUST be loaded before ./src/ui-kit-0.js)
       Order matches the header comment inside src/ui-kit-0.js -->
  <script src="./src/third_party/ajv/ajv7.bundle.min.js"></script>

  <script src="./src/third_party/ace/ace.js"></script>
  <script src="./src/third_party/ace/mode-json.js"></script>
  <script src="./src/third_party/ace/worker-json.js"></script>

  <!-- json-editor (used by SchemaConfigEditor "User"/Visual mode) -->
  <script src="./src/third_party/json-editor/jsoneditor.min.js"></script>

  <!-- Chart.js (used by ChartView) -->
  <script src="./src/third_party/chartjs/chart.umd.min.js"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    body { min-height: 100%; }
    #app { min-height: 100%; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    .log {
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 260px;
      overflow: auto;
      padding: 10px;
      border-radius: 12px;
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script type="module">
    import { ui } from "./src/ui-kit-0.js";
    import {
      // state
      Store,
      StateMachine,

      // primitives/widgets
      Card, HDiv, VDiv, HSpacer,
      Text, Button,
      Tabs,
      TableView,
      ChartView,
      ImageView,
      JsonTextEditor,
      SchemaConfigEditor,

      dom
    } from "./src/ui-kit-0.js";

    const app = document.querySelector("#app");

    // -------------------------
    // Helpers
    // -------------------------
    const now = () => new Date().toLocaleTimeString();
    const clamp = (n, a, b) => Math.max(a, Math.min(b, n));

    function log(line) {
      const el = document.querySelector("#log");
      if (!el) return;
      el.textContent = `[${now()}] ${line}\n` + el.textContent;
    }

    function setTheme(theme) {
      document.documentElement.setAttribute("data-ui-theme", theme);
      log(`Theme => ${theme}`);
    }

    function setDensity(density) {
      document.documentElement.setAttribute("data-ui-density", density);
      log(`Density => ${density}`);
    }

    function makeSelect(options, selected) {
      const sel = ui.select();
      for (const opt of options) {
        sel.add(ui.option(opt, opt));
      }
      sel.el.value = selected ?? options?.[0] ?? "";
      return sel;
    }

    function makeCheckbox(checked = false) {
      const cb = ui.input("checkbox");
      cb.el.checked = !!checked;
      return cb;
    }

    // -------------------------
    // Store + FSM demo state
    // -------------------------
    const store = new Store({
      counter: 0,
      text: "Hallo ui-kit/0",
      enabled: true,
      table: { filter: "", pageSize: 12 },
      chart: {
        type: "bar",
        points: Array.from({ length: 12 }, (_, i) => ({
          x: `M${i + 1}`,
          y: Math.round(20 + Math.random() * 80)
        }))
      }
    });

    const fsm = new StateMachine({
      initial: "idle",
      states: {
        idle:   { on: { START: "running" } },
        running:{ on: { STOP: "idle", ERROR: "error" } },
        error:  { on: { RESET: "idle" } }
      }
    });

    // -------------------------
    // Page Layout
    // -------------------------
    const root = ui.vdiv().style({ padding: "18px", gap: "14px" });

    const header = ui.hdiv().style({ gap: "10px", alignItems: "center", flexWrap: "wrap" });

    const title = ui.text("ui-kit/0 Demo").heading(2);
    const subtitle = ui.text("Maximale Widget-/Feature-Abdeckung (Store/FSM/Tabs/Table/Chart/Editor).").cls("ui-help");

    const themeRow = ui.hdiv().style({ gap: "8px", alignItems: "center" }).add(
      ui.text("Theme:").cls("ui-help"),
      ui.button("Dark").on("click", () => setTheme("dark")),
      ui.button("Light").on("click", () => setTheme("light"))
    );

    const densityRow = ui.hdiv().style({ gap: "8px", alignItems: "center" }).add(
      ui.text("Density:").cls("ui-help"),
      ui.button("Cozy").on("click", () => setDensity("cozy")),
      ui.button("Comfortable").on("click", () => setDensity("comfortable")),
      ui.button("Compact").on("click", () => setDensity("compact"))
    );

    const fsmBadge = ui.text("FSM: idle").cls("ui-badge");
    const updateFsmBadge = () => fsmBadge.text(`FSM: ${fsm.state ?? fsm.current ?? "?"}`);
    if (typeof fsm.subscribe === "function") fsm.subscribe(updateFsmBadge);
    updateFsmBadge();

    const fsmButtons = ui.hdiv().style({ gap: "8px", alignItems: "center", flexWrap: "wrap" }).add(
      fsmBadge,
      ui.button("Start").on("click", () => { fsm.send("START"); updateFsmBadge(); log("FSM START"); }),
      ui.button("Stop").on("click", () => { fsm.send("STOP"); updateFsmBadge(); log("FSM STOP"); }),
      ui.button("Error").on("click", () => { fsm.send("ERROR"); updateFsmBadge(); log("FSM ERROR"); }),
      ui.button("Reset").on("click", () => { fsm.send("RESET"); updateFsmBadge(); log("FSM RESET"); })
    );

    header.add(
      ui.vdiv().style({ gap: "2px" }).add(title, subtitle),
      ui.hspacer(),
      themeRow,
      densityRow,
      fsmButtons
    );

    const grid = ui.hdiv().style({ gap: "14px", alignItems: "stretch", flexWrap: "wrap" });
    const colLeft = ui.vdiv().style({ gap: "14px", flex: "1 1 520px", minWidth: "320px" });
    const colRight = ui.vdiv().style({ gap: "14px", flex: "1 1 520px", minWidth: "320px" });

    // -------------------------
    // Card: Event Log
    // -------------------------
    const logCard = new Card({ title: "Event Log" });
    const logEl = ui.div().attr("id", "log").cls("ui-surface mono log").text("");
    logCard.body.add(logEl.el);

    // -------------------------
    // Card: Controls / Store bindings
    // -------------------------
    const controlsCard = new Card({ title: "Controls & Store Bindings" });

    const counterRow = new HDiv({ gap: 8, align: "center", wrap: true });
    const counterText = new Text("counter = 0");
    const btnDec = new Button("–");
    const btnInc = new Button("+");
    const btnRand = new Button("Randomize chart");

    btnDec.on("click", () => store.set({ counter: store.state.counter - 1 }));
    btnInc.on("click", () => store.set({ counter: store.state.counter + 1 }));
    btnRand.on("click", () => {
      const pts = store.state.chart.points.map(p => ({ ...p, y: Math.round(10 + Math.random() * 90) }));
      store.set({ chart: { ...store.state.chart, points: pts } });
      log("chart randomized");
    });

    counterRow.add(counterText, new HSpacer(), btnDec, btnInc, btnRand);

    const textRow = new VDiv({ gap: 8 });
    const textLabel = new Text("Text:", { muted: true });
    const textInput = ui.input("text").attr("placeholder", "Tippe etwas…");
    textInput.el.value = store.state.text;
    textInput.on("input", (e) => store.set({ text: e.target.value }));

    const enabledRow = new HDiv({ gap: 10, align: "center", wrap: true });
    const enabledToggle = makeCheckbox(store.state.enabled);
    enabledToggle.on("change", (e) => store.set({ enabled: !!e.target.checked }));
    enabledRow.add(enabledToggle, new Text("Enabled", { muted: true }), new HSpacer(), new Text("Buttons disabled wenn !enabled", { muted: true }));

    // Delegated clicks demo
    const pillRow = ui.hdiv().style({ gap: "8px", flexWrap: "wrap" });
    const pills = ["alpha", "bravo", "charlie", "delta"].map(name =>
      ui.span(name).cls("demo-pill ui-badge").attr("data-name", name)
    );
    pillRow.add(ui.text("Delegation:").cls("ui-help"), ...pills);

    if (dom?.on) {
      const dispose = dom.on(pillRow.el, "click", ".demo-pill", (e, el) => {
        log(`delegated pill click => ${el.getAttribute("data-name")}`);
      });
      if (typeof controlsCard.own === "function") controlsCard.own(dispose);
    }

    // Store -> UI
    store.subscribePath("counter", (v) => counterText.setText(`counter = ${v}`), { immediate: true });
    store.subscribePath("text", (v) => { if (textInput.el.value !== v) textInput.el.value = v; }, { immediate: true });
    store.subscribePath("enabled", (v) => {
      enabledToggle.el.checked = !!v;
      btnDec.el.disabled = !v;
      btnInc.el.disabled = !v;
      log(`enabled => ${v}`);
    }, { immediate: true });

    controlsCard.body.add(counterRow, textRow.add(textLabel, textInput), enabledRow, pillRow);

    // -------------------------
    // Card: Tabs demo
    // -------------------------
    const tabsCard = new Card({ title: "Tabs (Responsive + Dropdown)" });
    const tabs = new Tabs();

    const tab1 = new VDiv({ gap: 10 });
    tab1.add(new Text("Tab 1: Layout primitives"));
    tab1.add(new HDiv({ gap: 8, wrap: true }).add(
      new Text("HDiv", { muted: true }),
      new Button("Button A"),
      new Button("Button B"),
      new HSpacer(),
      new Text("Spacer pushes", { muted: true })
    ));

    const tab2 = new VDiv({ gap: 10 });
    tab2.add(new Text("Tab 2: Store snapshot"));
    const snapshot = ui.div().cls("ui-surface mono").style({ padding: "10px", borderRadius: "12px", overflow: "auto" });
    const renderSnapshot = () => snapshot.text(JSON.stringify(store.state, null, 2));
    store.subscribePath("*", renderSnapshot, { immediate: true });
    tab2.add(snapshot.el);

    const tab3 = new VDiv({ gap: 10 });
    tab3.add(new Text("Tab 3: Actions"));
    tab3.add(new HDiv({ gap: 8, wrap: true }).add(
      new Button("Log Hello").on("click", () => log("Hello!")),
      new Button("Counter +10").on("click", () => store.set({ counter: store.state.counter + 10 })),
      new Button("Clamp counter [0..50]").on("click", () => store.set({ counter: clamp(store.state.counter, 0, 50) }))
    ));

    tabs.addTab("layout", "Layout", () => tab1);
    tabs.addTab("state", "State", () => tab2);
    tabs.addTab("actions", "Actions", () => tab3);

    tabsCard.body.add(tabs);

    // -------------------------
    // Card: TableView demo
    // -------------------------
    const tableCard = new Card({ title: "TableView" });

    const tableTop = new HDiv({ gap: 8, wrap: true, align: "center" });
    const filterInput = ui.input("text").attr("placeholder", "Filter name…");
    filterInput.el.value = store.state.table.filter;

    const pageSizeInput = ui.input("number").attr("min", "3").attr("max", "50");
    pageSizeInput.el.value = String(store.state.table.pageSize);

    filterInput.on("input", (e) => store.set({ table: { ...store.state.table, filter: e.target.value } }));
    pageSizeInput.on("input", (e) => {
      const n = clamp(parseInt(e.target.value || "12", 10) || 12, 3, 50);
      store.set({ table: { ...store.state.table, pageSize: n } });
    });

    const rows = Array.from({ length: 40 }, (_, i) => ({
      id: i + 1,
      name: ["Alice","Bob","Carla","Dieter","Erika","Fritz","Gina","Heinz"][i % 8] + " " + (i + 1),
      role: ["Admin","User","Guest"][i % 3],
      score: Math.round(Math.random() * 100)
    }));

    const table = new TableView({
      columns: [
        { key: "id", label: "ID", align: "right" },
        { key: "name", label: "Name" },
        { key: "role", label: "Role" },
        { key: "score", label: "Score", align: "right" }
      ],
      data: []
    });

    function refreshTable() {
      const f = (store.state.table.filter || "").toLowerCase().trim();
      const size = store.state.table.pageSize || 12;
      const filtered = !f ? rows : rows.filter(r => String(r.name).toLowerCase().includes(f));
      const slice = filtered.slice(0, size);
      if (typeof table.setRows === "function") table.setRows(slice);
      else if (typeof table.setData === "function") table.setData(slice);
      else table.data = slice; // last resort if your TableView reads .data
    }

    table.onRowClick((row, idx) => log(`table row click => idx=${idx} id=${row.id} name=${row.name}`));

    tableTop.add(
      new Text("Filter:", { muted: true }),
      filterInput,
      new Text("Page size:", { muted: true }),
      pageSizeInput,
      new HSpacer(),
      new Button("Add row").on("click", () => {
        const i = rows.length + 1;
        rows.push({
          id: i,
          name: ["Alice","Bob","Carla","Dieter","Erika","Fritz","Gina","Heinz"][i % 8] + " " + i,
          role: ["Admin","User","Guest"][i % 3],
          score: Math.round(Math.random() * 100)
        });
        refreshTable();
        log("table: added row");
      })
    );

    store.subscribePath("table.filter", refreshTable, { immediate: true });
    store.subscribePath("table.pageSize", refreshTable, { immediate: true });

    tableCard.body.add(tableTop, table);

    // -------------------------
    // Card: Chart demo (Chart.js)
    // -------------------------
    const chartCard = new Card({ title: "ChartView (Chart.js)" });

    const chartTop = new HDiv({ gap: 8, wrap: true, align: "center" });

    const typeSelect = makeSelect(["bar", "line"], store.state.chart.type);
    typeSelect.on("change", (e) => store.set({ chart: { ...store.state.chart, type: e.target.value } }));

    chartTop.add(new Text("Type:", { muted: true }), typeSelect, new HSpacer(), new Text("Store-bound via map(state)", { muted: true }));

    const chart = new ChartView({
      type: store.state.chart.type,
      height: 280,
      map: (state) => {
        const pts = state.chart.points || [];
        return {
          labels: pts.map(p => p.x),
          datasets: [
            { label: "Score", data: pts.map(p => p.y) }
          ]
        };
      }
    });

    // Re-render on chart subtree changes
    store.subscribePath("chart", () => chart.updateFrom(store.state), { immediate: true });

    chartCard.body.add(chartTop, chart);

    // -------------------------
    // Card: Editors demo (AJV + JSONEditor + Ace)
    // -------------------------
    const editorsCard = new Card({ title: "Editors (JsonTextEditor + SchemaConfigEditor)" });

    const schema = {
      type: "object",
      properties: {
        serverName: { type: "string", minLength: 1 },
        maxPlayers: { type: "integer", minimum: 1, maximum: 128 },
        features: { type: "array", items: { type: "string" } }
      },
      required: ["serverName", "maxPlayers"]
    };

    const initialConfig = {
      serverName: "demo",
      maxPlayers: 24,
      features: ["tabs", "table", "chart", "store", "fsm"]
    };

    // SchemaConfigEditor ist STORE-gebunden:
    // - value liegt im Store unter valuePath (default: "jsonConfig")
    // - schema kommt entweder als "schema" (fix) oder aus schemaPath (editable)
    store.setPath("jsonConfig", initialConfig);
    // optional: Schema im Store halten, damit Expert-Tab Schema editieren kann
    // store.setPath("jsonSchema", schema);


    // JsonTextEditor is your lightweight textarea+AJV validator (exported name!)
    const jsonTextEditor = new JsonTextEditor({
      schema,
      initialValue: initialConfig,
      onChange: (val, res) => {
        if (res?.ok) log("JsonTextEditor: ✓ valid");
      }
    }).onValid((val) => {
      log("JsonTextEditor: onValid() fired");
    });

    // SchemaConfigEditor uses:
    // - window.ajv7 (AJV bundle)
    // - window.JSONEditor (visual form editor)
    // - window.ace (expert JSON editor)
    const schemaEditor = new SchemaConfigEditor({
      store,
      title: "Config Editor",
      valuePath: "jsonConfig",
      schema, // fix schema; alternativ: schemaPath: "jsonSchema"
      // schemaPath: "jsonSchema",
    });

    // Optional wiring: if SchemaConfigEditor exposes onChange, mirror into JsonTextEditor
    if (typeof schemaEditor.onChange === "function") {
      schemaEditor.onChange((val) => {
        if (typeof jsonTextEditor.setValue === "function") jsonTextEditor.setValue(val);
        log("SchemaConfigEditor -> JsonTextEditor sync");
      });
    }

    editorsCard.body.add(
      new Text("Hinweis: SchemaConfigEditor benötigt ajv7 + JSONEditor + Ace (siehe <head> includes).", { muted: true }),
      jsonTextEditor,
      schemaEditor
    );

    // -------------------------
    // Card: ImageView demo (no asset required)
    // -------------------------
    const imageCard = new Card({ title: "ImageView (Data-URI, no file needed)" });

    const svg = encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="900" height="260">
        <rect width="100%" height="100%" fill="#222"/>
        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
              fill="#ddd" font-family="monospace" font-size="28">
          ui-kit/0 ImageView demo
        </text>
      </svg>
    `.trim());
    const dataUri = `data:image/svg+xml;charset=utf-8,${svg}`;

    const imageView = new ImageView({ src: dataUri, alt: "Demo SVG" });
    imageCard.body.add(
      new Text("Src ist ein data:image/svg+xml – dadurch keine extra Assets nötig.", { muted: true }),
      imageView
    );

    // -------------------------
    // Assemble columns
    // -------------------------
    colLeft.add(controlsCard, tabsCard, logCard);
    colRight.add(tableCard, chartCard, editorsCard, imageCard);

    grid.add(colLeft, colRight);
    root.add(header, grid);

    app.replaceChildren(root.el);

    log("Demo loaded.");
    log("Resize window → Tabs sollten in den Dropdown-Mode wechseln, wenn es eng wird.");
  </script>
</body>
</html>
